<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>員工培訓系統</title>
  <style>
    body { font-family: "Microsoft JhengHei", Arial, sans-serif; background-color: #f0f2f5; margin: 0; padding: 15px; display: flex; justify-content: center; }
    .container { max-width: 800px; width: 100%; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); text-align: center; box-sizing: border-box; }
    h2 { color: #1a73e8; margin-top: 0; font-size: 22px; }
    p { color: #5f6368; line-height: 1.5; font-size: 16px; }
    
    input[type="text"] { width: 85%; padding: 15px; margin: 10px 0; border: 1px solid #dadce0; border-radius: 8px; font-size: 16px; outline: none; box-sizing: border-box; }
    input:focus { border-color: #1a73e8; }
    
    .btn { background-color: #1a73e8; color: white; padding: 15px 30px; border: none; border-radius: 8px; cursor: pointer; font-size: 18px; font-weight: bold; width: 85%; margin-top: 20px; box-sizing: border-box; }
    .btn:hover { background-color: #1765cc; }

    .step { display: none; }
    .active { display: block; }
    
    /* 16:9 手機響應式版面 */
    .video-container { 
      position: relative; 
      width: 100%; 
      padding-bottom: 56.25%; 
      height: 0; 
      margin: 20px 0; 
      background: #000; 
      border-radius: 8px; 
      overflow: hidden; 
    }
    .video-container iframe, 
    .video-container div, 
    #ytPlayer { 
      position: absolute; 
      top: 0; 
      left: 0; 
      width: 100% !important; 
      height: 100% !important; 
      border: none; 
    }

    .timer-info { 
      color: #65676b; 
      font-weight: normal; 
      padding: 8px; 
      margin-top: 40px; 
      font-size: 13px;  
      letter-spacing: 0.5px;
    }
    
    .instruction-text { margin-top: 40px; padding: 15px; border-top: 1px solid #eee; color: #d93025; font-weight: bold; font-size: 15px; line-height: 1.6; }
  </style>

  <!-- 載入官方 YouTube Iframe Player API -->
  <script src="https://www.youtube.com/iframe_api"></script>
</head>
<body>

<div class="container">
  <!-- 第一步：輸入姓名與編號 -->
  <div id="step1" class="step active">
    <h2>員工培訓系統</h2>
    <p>請輸入您的員工編號及姓名進行驗證：</p>
    <input type="text" id="staffId" placeholder="員工編號 (Staff ID)" required><br>
    <input type="text" id="staffName" placeholder="員工姓名 (Full Name)" required><br>
    <button class="btn" onclick="startFlow()">確認及進入培訓</button>
    
    <div class="instruction-text">
      整個培訓內容約16分鐘，在整個片段播放完成後，<br>
      才正式生成培訓記錄。
    </div>
  </div>

  <!-- 第二步：智慧防快進播放器 -->
  <div id="step2" class="step">
    <h2>培訓影片播放中</h2>
    <p>歡迎 <span id="userName" style="font-weight:bold; color:#1a73e8;"></span>，請完整觀看以下影片：</p>
    
    <div class="video-container">
      <div id="ytPlayer"></div>
    </div>
    
    <div id="timerDisplay" class="timer-info">
      剩餘觀看時間：<span id="countdown">16:10</span>
    </div>
  </div>

  <!-- 第三步：自動提交成功頁面 -->
  <div id="step3" class="step">
    <h2 style="color: #188038;">✓ 登記成功</h2>
    <p>謝謝，您的培訓記錄已成功存檔。</p>
    <p>您現在可以安全關閉此網頁視窗。</p>
  </div>
</div>

<script>
  let staffId = "";
  let staffName = "";
  let totalDuration = 970; // 預設 16分10秒 = 970秒
  let maxTimeWatched = 0;   
  let player;
  let checkInterval;

  function onYouTubeIframeAPIReady() {
    player = new YT.Player('ytPlayer', {
      videoId: 'Ckp_dSs-KCk', 
      playerVars: {
        'autoplay': 0,
        'controls': 1,     
        'rel': 0,
        'disablekb': 1     
      },
      events: {
        'onReady': onPlayerReady,
        'onStateChange': onPlayerStateChange
      }
    });
  }

  function onPlayerReady(event) {
    totalDuration = Math.floor(player.getDuration()) || 970;
  }

  function startFlow() {
    staffId = document.getElementById('staffId').value.trim();
    staffName = document.getElementById('staffName').value.trim();
    
    if(!staffId || !staffName) {
      alert("請輸入員工編號及姓名。");
      return;
    }
    
    document.getElementById('userName').innerText = staffName;
    changeStep('step1', 'step2');
    
    if (player && player.playVideo) {
      player.playVideo();
    }
  }

  function onPlayerStateChange(event) {
    if (event.data == YT.PlayerState.PLAYING) {
      checkInterval = setInterval(function() {
        let currentTime = player.getCurrentTime();
        let duration = Math.floor(player.getDuration()) || totalDuration;
        
        // 防快進作弊監控：若拖動進度條超過已看過的最大時間點就強制彈回
        if (currentTime > maxTimeWatched + 2) {
          player.seekTo(maxTimeWatched, true); 
          alert("為確保培訓成效，請勿快進跳過影片內容！");
        } else {
          if (currentTime > maxTimeWatched) {
            maxTimeWatched = currentTime;
          }
        }
        
        // 實時計算剩餘時間
        let timeLeft = duration - Math.floor(currentTime);
        if (timeLeft < 0) timeLeft = 0;
        
        let mins = Math.floor(timeLeft / 60);
        let secs = timeLeft % 60;
        document.getElementById('countdown').innerText = mins + ":" + (secs < 10 ? '0' + secs : secs);
        
      }, 500);
      
    } else {
      clearInterval(checkInterval);
      
      // 💡 終極修復核心：只要 YouTube 判定影片播完 (ENDED)，就立即 100% 信任並觸發自動同步！
      if (event.data == YT.PlayerState.ENDED) {
        autoSubmitToGoogleSheet();
      }
    }
  }

  function autoSubmitToGoogleSheet() {
    clearInterval(checkInterval);
    
    let timerDiv = document.getElementById('timerDisplay');
    timerDiv.innerHTML = "⏳ 影片播放完畢！正在自動同步培訓紀錄，請勿關閉網頁...";
    timerDiv.style.color = "#188038";
    timerDiv.style.fontSize = "15px";
    
    // 您的專屬 Google apps script 後台網址
    const webAppUrl = "https://script.google.com/macros/s/AKfycbww7iauIoltNo7B30y-EUqbAn8ChgefDXeoKSkTREyrP2Whw15C7QJbHkxx-x9I_xml/exec"; 
    
    let details = { 'staffId': staffId, 'staffName': staffName };
    let formBody = [];
    for (let property in details) {
      formBody.push(encodeURIComponent(property) + "=" + encodeURIComponent(details[property]));
    }
    formBody = formBody.join("&");
    
    fetch(webAppUrl, {
      method: 'POST',
      headers: { 'Content-Type': 'application/x-www-form-urlencoded;charset=UTF-8' },
      body: formBody,
      mode: 'no-cors' 
    })
    .then(() => {
      changeStep('step2', 'step3');
    })
    .catch((err) => {
      alert("連線發送失敗，請檢查手機網路信號後重試。");
    });
  }

  function changeStep(hideId, showId) {
    document.getElementById(hideId).classList.remove('active');
    document.getElementById(showId).classList.add('active');
  }
</script>

</body>
</html>
